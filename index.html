<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sterile Stock Alert Realtime</title>
<style>
body{margin:0;background:#eef3f9;font-family:Arial,'Noto Sans Thai',sans-serif;color:#0f172a}
.wrap{max-width:1450px;margin:auto;padding:18px}.hero{background:linear-gradient(135deg,#07112f,#1d4ed8,#0891b2);color:white;border-radius:26px;padding:24px;margin-bottom:16px}
h1{margin:0;font-size:38px}.hero p{line-height:1.6}.btn{border:0;border-radius:14px;background:white;color:#1e3a8a;padding:12px 16px;font-weight:900;cursor:pointer;margin:5px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.card{background:white;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 5px 18px #0f172a18}
.kpi .v{font-size:34px;font-weight:900}.kpi .l{color:#64748b;font-weight:800}.filters{display:grid;grid-template-columns:1fr 1fr 1.5fr 1fr auto;gap:10px;margin-bottom:12px}
select,input{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px}table{width:100%;border-collapse:collapse;background:white;font-size:13px}
th{background:#0f172a;color:white;position:sticky;top:0}th,td{padding:10px;border-bottom:1px solid #e2e8f0;vertical-align:top}td:nth-child(4){min-width:240px}.num{text-align:right;font-weight:800}
.tableWrap{overflow:auto;max-height:680px}.pill{display:inline-block;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:4px 8px;margin:2px;font-weight:900}
.badge{border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px}.red{background:#fee2e2;color:#991b1b}.orange{background:#ffedd5;color:#9a3412}.yellow{background:#fef3c7;color:#92400e}.blue{background:#cffafe;color:#155e75}.green{background:#dcfce7;color:#166534}.violet{background:#ede9fe;color:#5b21b6}
.summary{white-space:pre-wrap;background:#0f172a;color:white;border-radius:16px;padding:16px;line-height:1.7}
@media(max-width:900px){.grid,.filters{grid-template-columns:1fr}.wrap{padding:10px}h1{font-size:28px}.btn{width:100%}}
</style></head><body><div class="wrap">

<section class="hero">
<h1>📦 Sterile Stock Alert Realtime</h1>
<p>ดึงข้อมูลจาก Google Sheet กลางอัตโนมัติ ทุกคนเปิดลิงก์เดียวกัน เห็นข้อมูลเดียวกัน ไม่ต้อง Upload Excel รายเครื่อง</p>
<button class="btn" onclick="loadData()">🔄 Refresh Now</button>
<button class="btn" onclick="copySummary()">📋 Copy Summary แจ้งทีม</button>
<span id="status">กำลังโหลดข้อมูล...</span>
</section>

<section class="grid">
<div class="card kpi"><div class="l">รายการทั้งหมด</div><div class="v" id="kTotal">0</div></div>
<div class="card kpi"><div class="l">ต่ำกว่า Min</div><div class="v" id="kBelow">0</div></div>
<div class="card kpi"><div class="l">Critical</div><div class="v" id="kCritical">0</div></div>
<div class="card kpi"><div class="l">ติด WPX</div><div class="v" id="kWPX">0</div></div>
<div class="card kpi"><div class="l">มีแผนเข้าคลัง</div><div class="v" id="kIncoming">0</div></div>
</section>

<section class="card">
<h2>🔎 Filter & Search</h2>
<div class="filters">
<select id="groupF" onchange="render()"><option value="ALL">All</option><option>TG</option><option>NDC</option><option>WPX</option></select>
<select id="statusF" onchange="render()"><option value="ALL">All</option><option value="CRITICAL">Critical</option><option value="BELOW_MIN">ต่ำกว่า Min</option><option value="WPX">ติด WPX</option><option value="WAITING">มีแผนเข้าคลัง</option><option value="NO_PLAN">ยังไม่มีกำหนดเข้า</option><option value="NORMAL">Normal</option></select>
<input id="search" oninput="render()" placeholder="ค้นหารหัสสินค้า / ชื่อสินค้า">
<input id="cutoff" type="date" onchange="render()">
<button class="btn" onclick="downloadCSV()">⬇️ Export CSV</button>
</div>
<div id="note"></div>
<div class="tableWrap"><table id="tbl"></table></div>
</section>

<section class="card">
<h2>📢 ข้อความสรุปแจ้งทีม</h2>
<div id="summary" class="summary">กำลังโหลดข้อมูล...</div>
</section>

</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vSVc3tXKUjmTyp3Zi0VC9Drlcn8epvTj17p0TMWbt4qk6bBaxD1Cup0gtIL0A0mcadXkzlHApGtjREV/pub?gid=19793380&single=true&output=csv';
let rawData=[];

function num(v){const n=Number(String(v??'').replace(/,/g,''));return isNaN(n)?0:n}
function csvParse(t){let r=[],row=[],c='',q=false;for(let i=0;i<t.length;i++){let ch=t[i],n=t[i+1];if(ch=='"'&&q&&n=='"'){c+='"';i++;continue}if(ch=='"'){q=!q;continue}if(ch==','&&!q){row.push(c);c='';continue}if((ch=='\n'||ch=='\r')&&!q){if(c||row.length){row.push(c);r.push(row);row=[];c=''}if(ch=='\r'&&n=='\n')i++;continue}c+=ch}if(c||row.length){row.push(c);r.push(row)}return r}
function dObj(v){if(!v)return null;let s=String(v).trim();let m=s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);if(m){let y=+m[3];if(y<100)y=2000+y;return new Date(y,+m[2]-1,+m[1])}let d=new Date(s);return isNaN(d)?null:d}
function fDate(v){let d=dObj(v);if(!d)return '';return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`}
function iso(v){let d=dObj(v);if(!d)return '';return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function cutoff(){let v=document.getElementById('cutoff').value;if(!v)return null;return new Date(v+'T00:00:00')}
function setCutoff(){let el=document.getElementById('cutoff');if(!el.value){let d=new Date();el.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}}
function mergePlans(plans){let m={};plans.forEach(p=>{if(!p.date||num(p.qty)<=0)return;let k=p.iso||p.date;if(!m[k])m[k]={date:p.date,iso:p.iso,qty:0};m[k].qty+=num(p.qty)});return Object.values(m).sort((a,b)=>new Date(a.iso)-new Date(b.iso))}
function activePlans(x){let c=cutoff();return (x.plans||[]).filter(p=>!c||new Date(p.iso+'T00:00:00')>=c)}
function totalPlan(x){return activePlans(x).reduce((s,p)=>s+num(p.qty),0)}
function planText(x){let p=activePlans(x);return p.length?p.map(a=>`${a.date} = ${num(a.qty).toLocaleString()} ${x.unit||''}`).join(', '):'-'}
function planHtml(x){let p=activePlans(x);return p.length?p.map(a=>`<span class="pill">${a.date} = ${num(a.qty).toLocaleString()}</span>`).join(''):'-'}

function normalize(rows){
 let h=rows[0].map(x=>String(x).trim()), list=[];
 rows.slice(1).forEach(r=>{
  let o={};h.forEach((k,i)=>o[k]=r[i]||'');
  let code=o['Product Code']||o['Code']||o['รหัสสินค้า']; if(!code)return;
  let plan=[]; let dt=o['Incoming Date']||o['วันที่เข้าคลัง']; let qt=o['Incoming Qty']||o['จำนวนเข้าคลัง'];
  if(dt&&num(qt)>0)plan.push({date:fDate(dt),iso:iso(dt),qty:num(qt)});
  list.push({group:o['Group']||o['กลุ่ม']||'',code:String(code).trim(),name:o['Product Name']||o['ชื่อสินค้า']||'',unit:o['Unit']||o['หน่วย']||'',over:num(o['Over Stock']),min:num(o['Min Stock']||o['Min']),below:num(o['Below Min']||o['ต่ำกว่า Min']),critical:num(o['Critical']),wpx:num(o['WPX']),remark:o['Remark']||o['หมายเหตุ']||'',plans:plan});
 });
 let m={}; list.forEach(x=>{let k=[x.group,x.code,x.unit].join('|');if(!m[k])m[k]={...x};else{let y=m[k];y.name=y.name||x.name;y.over=Math.max(y.over,x.over);y.min=Math.max(y.min,x.min);y.below=Math.max(y.below,x.below);y.critical=Math.max(y.critical,x.critical);y.wpx=Math.max(y.wpx,x.wpx);y.plans=mergePlans([...y.plans,...x.plans]);}});
 return Object.values(m);
}

async function loadData(){
 try{
  document.getElementById('status').textContent='กำลังโหลดจาก Google Sheet...';
  let res=await fetch(CSV_URL+'&t='+Date.now());
  let text=await res.text();
  rawData=normalize(csvParse(text));
  render();
  document.getElementById('status').textContent='อัปเดตล่าสุด: '+new Date().toLocaleString('th-TH');
 }catch(e){document.getElementById('status').textContent='โหลดข้อมูลไม่สำเร็จ';console.error(e)}
}

function statusOf(x){if(x.critical>0)return'CRITICAL';if(x.below>0&&totalPlan(x)<=0)return'NO_PLAN';if(x.below>0&&totalPlan(x)>0)return'WAITING';if(x.wpx<0)return'WPX';if(totalPlan(x)>0)return'WAITING';return'NORMAL'}
function stLabel(s){return{CRITICAL:'Critical',NO_PLAN:'ต่ำกว่า Min / ยังไม่มีกำหนด',WAITING:'มีแผนเข้าคลัง',WPX:'ติด WPX / ค้างส่ง',NORMAL:'Normal'}[s]}
function stClass(s){return{CRITICAL:'red',NO_PLAN:'orange',WAITING:'yellow',WPX:'blue',NORMAL:'green'}[s]}

function filtered(){let g = groupF.value;
  let st = statusF.value;
  let q = search.value.toLowerCase();

  return rawData.filter(x=>{
    if(g !== 'ALL' && x.group !== g) return false;

    if(st === 'BELOW_MIN' && x.below <= 0) return false;
    if(st === 'CRITICAL' && x.critical <= 0) return false;
    if(st === 'WPX' && x.wpx >= 0) return false;
    if(st === 'WAITING' && totalPlan(x) <= 0) return false;
    if(st === 'NO_PLAN' && totalPlan(x) > 0) return false;
    if(st === 'NORMAL' && statusOf(x) !== 'NORMAL') return false;

    if(q && !(`${x.code} ${x.name}`.toLowerCase().includes(q))) return false;

    return true;
if(st==='WPX' && x.wpx>=0) return false;
if(st==='WAITING' && totalPlan(x)<=0) return false;
if(st==='NO_PLAN' && totalPlan(x)>0) return false;
if(st==='CRITICAL' && x.critical<=0) return false;
if(st==='NORMAL' && statusOf(x)!=='NORMAL') return false; })}
function render(){setCutoff();let d=filtered();kTotal.textContent=rawData.length;kBelow.textContent=rawData.filter(x=>x.below>0).length;kCritical.textContent=rawData.filter(x=>x.critical>0).length;kWPX.textContent=rawData.filter(x=>x.wpx<0).length;kIncoming.textContent=rawData.filter(x=>totalPlan(x)>0).length;note.textContent=`แสดง ${d.length} รายการ จากทั้งหมด ${rawData.length} รายการ`;
tbl.innerHTML=`<thead><tr><th>สถานะ</th><th>กลุ่ม</th><th>รหัสสินค้า</th><th>ชื่อสินค้า</th><th>หน่วย</th><th>Min</th><th>ต่ำกว่า Min</th><th>Critical</th><th>WPX</th><th>รวมเข้าคลัง</th><th>แผนเข้าคลัง</th><th>หมายเหตุ</th></tr></thead><tbody>`+
d.map(x=>`<tr><td><span class="badge ${stClass(statusOf(x))}">${stLabel(statusOf(x))}</span></td><td>${x.group}</td><td><b>${x.code}</b></td><td>${x.name}</td><td>${x.unit}</td><td class="num">${x.min.toLocaleString()}</td><td class="num">${x.below.toLocaleString()}</td><td class="num">${x.critical.toLocaleString()}</td><td class="num">${x.wpx.toLocaleString()}</td><td class="num">${totalPlan(x).toLocaleString()}</td><td>${planHtml(x)}</td><td>${x.remark}</td></tr>`).join('')+'</tbody>';
summary.textContent=buildSummary();
}
function buildSummary(){let txt=`แจ้งสถานะสินค้า Sterile / Stock Alert\nอัปเดต: ${new Date().toLocaleString('th-TH')}\n\n`;['TG','NDC','WPX'].forEach(g=>{let a=rawData.filter(x=>x.group==g),inc=a.filter(x=>totalPlan(x)>0);txt+=`กลุ่ม ${g}\n- ทั้งหมด: ${a.length}\n- Critical: ${a.filter(x=>x.critical>0).length}\n- ต่ำกว่า Min: ${a.filter(x=>x.below>0).length}\n- ติด WPX: ${a.filter(x=>x.wpx<0).length}\n- มีแผนเข้าคลัง: ${inc.length}\n`;inc.forEach((x,i)=>txt+=`${i+1}) ${x.code} ${x.name} | รวมเข้า ${totalPlan(x).toLocaleString()} ${x.unit} | ${planText(x)}\n`);txt+='\n'});return txt}
async function copySummary(){await navigator.clipboard.writeText(buildSummary());alert('Copy Summary แล้ว')}
function downloadCSV(){let rows=filtered(),lines=[['Status','Group','Code','Name','Unit','TotalIncoming','Schedule'].join(',')];rows.forEach(x=>lines.push([stLabel(statusOf(x)),x.group,x.code,x.name,x.unit,totalPlan(x),planText(x)].map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')));let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));a.download='stock_alert.csv';a.click()}
loadData();setInterval(loadData,60000);
</script></body></html>
